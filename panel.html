<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLTR - Operatör Kontrol Paneli</title>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap">
    <link rel="stylesheet" href="taraf.css">

    <style>
        body { background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; margin: 0; }
        .editor-container { max-width: 1000px; margin: 0 auto; background: rgba(20,20,20,0.95); border: 1px solid #f58220; border-radius: 15px; padding: 30px; margin-bottom: 30px; }
        
        .ql-toolbar { background: #eee !important; border-radius: 10px 10px 0 0 !important; }
        .ql-container { background: #111 !important; color: #fff !important; border-radius: 0 0 10px 10px !important; min-height: 300px; font-size: 16px; border: 1px solid #333 !important; }
        .ql-editor { min-height: 300px; }

        h2 { color: #f58220; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        h3 { color: #f58220; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; color: #888; margin-bottom: 8px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        input[type="text"], input[type="url"] { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #f58220; }
        
        .btn-send { width: 100%; padding: 15px; background: #f58220; color: #000; font-weight: 800; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; font-size: 1rem; transition: 0.3s; }
        .btn-send:hover { background: #ff9940; box-shadow: 0 0 20px rgba(245, 130, 32, 0.4); }
        
        .my-news-list { max-width: 1000px; margin: 0 auto; background: rgba(15,15,15,0.9); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .news-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .news-item:last-child { border-bottom: none; }
        .delete-btn { background: #ff3333; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        .hidden { display: none; }
        #login-box { max-width: 400px; margin: 100px auto; border: 1px solid #f58220; padding: 40px; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

    <div id="login-section">
        <div id="login-box">
            <img src="img/tr/hltrwikiweb.png" style="width: 80px; margin-bottom: 20px;">
            <h2>HABERCİ GİRİŞİ</h2>
            <input type="text" id="username" placeholder="Haberci Adı">
            <input type="password" id="password" placeholder="Şifre" style="width:100%; padding:10px; margin:10px 0; background:#111; border:1px solid #333; color:#fff;">
            <button id="login-btn-action" style="width:100%; padding:10px; background:#f58220; color:#000; font-weight:bold; border:none; cursor:pointer;">BAĞLAN</button>
        </div>
    </div>

    <div id="admin-section" class="hidden">
        <div class="editor-container">
            <h2 id="welcome-text">HABER KONTROL MERKEZİ</h2>
            
            <div class="input-group">
                <label>Haber Başlığı</label>
                <input type="text" id="news-title" placeholder="Haberin ana başlığını girin...">
            </div>

            <div class="input-group">
                <label>Yazar İsmi (Sitede görünecek adınız)</label>
                <input type="text" id="news-author-display" placeholder="Örn: Sercan, G-Man, Freeman...">
            </div>

            <div class="input-group">
                <label>Kapak Resmi URL</label>
                <input type="url" id="news-thumb" placeholder="https://.../resim.jpg">
            </div>

            <div class="input-group">
                <label>Haber İçeriği</label>
                <div id="editor"></div>
            </div>

            <button id="post-btn" class="btn-send">HABERİ YAYINLA</button>
            <button id="logout-btn-action" style="background:none; border:1px solid #ff3333; color:#ff3333; width:100%; margin-top:10px; padding:10px; cursor:pointer; border-radius:8px;">AĞDAN ÇIKIŞ YAP</button>
        </div>

        <div class="my-news-list">
            <h3>HABERLERİM</h3>
            <div id="my-news-container"></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSFWOKj20USZpyfb3CobaFyhsIAr_Cb2A",
            authDomain: "hltr-haberler.firebaseapp.com",
            projectId: "hltr-haberler",
            storageBucket: "hltr-haberler.firebasestorage.app",
            messagingSenderId: "458236342220",
            appId: "1:458236342220:web:ebb9a32534cd1ce304f769"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline'],
                    [{ 'color': [] }, { 'background': [] }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        document.getElementById('login-btn-action').addEventListener('click', () => {
            const user = document.getElementById('username').value + "@hltr.com";
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, user, pass).catch(e => alert("Hata: " + e.message));
        });

        document.getElementById('logout-btn-action').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('welcome-text').innerText = "HOŞ GELDİN, " + user.email.split('@')[0].toUpperCase();
                haberlerimiGetir(user.email);
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('admin-section').classList.add('hidden');
            }
        });

        async function haberlerimiGetir(userEmail) {
            const container = document.getElementById('my-news-container');
            const q = query(collection(db, "haberler"), where("yazar_eposta", "==", userEmail), orderBy("tarih", "desc"));
            try {
                const querySnapshot = await getDocs(q);
                container.innerHTML = "";
                if(querySnapshot.empty) container.innerHTML = "<p style='text-align:center;'>Henüz haberiniz yok.</p>";
                querySnapshot.forEach((docSnap) => {
                    const item = document.createElement('div');
                    item.className = "news-item";
                    item.innerHTML = `<span>${docSnap.data().baslik}</span><button class="delete-btn" onclick="haberSil('${docSnap.id}')">SİL</button>`;
                    container.appendChild(item);
                });
            } catch (e) { console.error(e); }
        }

        window.haberSil = async (id) => {
            if(confirm("Silinsin mi Sir?")) {
                await deleteDoc(doc(db, "haberler", id));
                location.reload();
            }
        };

        document.getElementById('post-btn').addEventListener('click', async () => {
            const title = document.getElementById('news-title').value;
            const author = document.getElementById('news-author-display').value;
            const thumb = document.getElementById('news-thumb').value;
            const content = quill.root.innerHTML;

            if(!title || !author || content === "<p><br></p>") return alert("Eksik bilgi!");

            document.getElementById('post-btn').innerText = "İŞLENİYOR...";

            try {
                await addDoc(collection(db, "haberler"), {
                    baslik: title,
                    yazar: author, // KUTUDAN GELEN İSİM
                    kapak: thumb || "img/tr/hltrwikiweb.png",
                    icerik: content,
                    tarih: serverTimestamp(),
                    yazar_eposta: auth.currentUser.email
                });
                alert("Haber Yayınlandı!");
                location.reload();
            } catch (e) {
                alert("Hata: " + e.message);
                document.getElementById('post-btn').innerText = "HABERİ YAYINLA";
            }
        });
    </script>
</body>
</html>
