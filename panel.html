<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kontrol Paneli</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap">
    <link rel="stylesheet" href="taraf.css">
    <style>
        body { background: #050505 url('img/black-mesa-bg.jpg') no-repeat center center fixed; background-size: cover; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        body::before { content: ""; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: -1; }
        
        .container { background: rgba(20,20,20,0.95); padding: 40px; border-radius: 15px; border: 1px solid rgba(245, 130, 32, 0.3); width: 100%; max-width: 500px; box-shadow: 0 0 20px rgba(245, 130, 32, 0.1); }
        
        h2 { color: #f58220; text-align: center; letter-spacing: 2px; margin-bottom: 25px; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 5px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #f58220; }
        
        button { width: 100%; padding: 12px; margin-top: 15px; background: #f58220; color: #000; font-weight: 800; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        button:hover { background: #ff9940; transform: scale(1.02); }
        .logout-btn { background: transparent; border: 1px solid #ff3333; color: #ff3333; margin-top: 10px; }
        .logout-btn:hover { background: #ff3333; color: #fff; }

        .hidden { display: none !important; }
        .message { text-align: center; margin-bottom: 15px; font-weight: bold; font-size: 0.9rem; }
        .error { color: #ff3333; }
        .success { color: #4CAF50; }
    </style>
</head>
<body>

    <div id="login-section" class="container">
        <div style="text-align: center;"><img src="img/tr/hltrwikiweb.png" alt="Logo" style="width: 60px; margin-bottom: 15px;"></div>
        <h2>GÜVENLİK AĞI</h2>
        <div id="login-msg" class="message error"></div>
        
        <input type="text" id="username" placeholder="Operatör Adı" required>
        <input type="password" id="password" placeholder="Erişim Şifresi" required>
        
        <button id="login-btn">AĞA BAĞLAN</button>
    </div>

    <div id="admin-section" class="container hidden">
        <h2>KONTROL PANELİ</h2>
        <div id="post-msg" class="message success"></div>
        <input type="text" id="news-title" placeholder="Haber Başlığı" required>
        <textarea id="news-content" rows="8" placeholder="Haber İçeriği..." required></textarea>
        <button id="post-btn">VERİTABANINA YAZ</button>
        <button id="logout-btn" class="logout-btn">AĞDAN ÇIK</button>
    </div>
