        html { scrollbar-width: thin; scrollbar-color: #f58220 #050505; }

        ::-webkit-scrollbar-thumb:hover { background: #ff9940; }

        /* ==========================================================================
           SAYFA ARKA PLANI VE BAŞLIK
           ========================================================================== */
        body {
            background: #050505 url('img/black-mesa-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        body::before { content: ""; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: -1; }

        .hero { text-align: center; padding: 50px 20px 10px; }
        .hero h1 { font-size: clamp(2.5rem, 5vw, 4rem); color: var(--primary-orange, #f58220); text-transform: uppercase; letter-spacing: 2px; }
        .hero p { color: #888; font-weight: 700; margin-top: 10px; font-family: 'Courier Prime', monospace; font-size: 1.1rem; }

        /* ==========================================================================
           BAĞIMSIZ KART TASARIMI VE KLONLAMA ANİMASYONU
           ========================================================================== */
        .cards-section {
            padding: 3rem 0;
            display: flex;
            justify-content: center;
        }

        #cards {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: space-evenly;
            flex-wrap: wrap;
            gap: 3rem;
        }

        .card {
            background-size: cover;
            background-position: center;
            position: relative;
            cursor: pointer;
            outline: none;
            transition: scale 100ms;
            text-decoration: none;
            display: block;
        }

        .card .card-front-image {
            position: relative;
            z-index: 2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        }

        .card .card-image {
            width: clamp(250px, 20vw, 350px);
            aspect-ratio: 2 / 3;
            border-radius: clamp(0.5rem, 0.75vw, 1rem);
            object-fit: cover;
        }

        .card-faders {
            height: 100%;
            width: 100%;
            position: absolute;
            left: 0;
            top: 0;
            z-index: 1;
            opacity: 0;
            transition: opacity 1500ms;
            pointer-events: none;
        }

        .card:hover .card-faders {
            opacity: 1;
        }

        .card:active {
            scale: 0.98;
        }

        .card-fader {
            position: absolute;
            left: 0;
            top: 0;
        }

        .card-fader:nth-child(odd) {
            animation: fade-left 3s linear infinite;
        }

        .card-fader:nth-child(even) {
            animation: fade-right 3s linear infinite;
        }

        .card-fader:is(:nth-child(3), :nth-child(4)) { animation-delay: 750ms; }
        .card-fader:is(:nth-child(5), :nth-child(6)) { animation-delay: 1500ms; }
        .card-fader:is(:nth-child(7), :nth-child(8)) { animation-delay: 2250ms; }

        @keyframes fade-left {
            from { scale: 1; translate: 0%; opacity: 1; }
            to   { scale: 0.8; translate: -30%; opacity: 0; }
        }

        @keyframes fade-right {
            from { scale: 1; translate: 0%; opacity: 1; }
            to   { scale: 0.8; translate: 30%; opacity: 0; }
        }

        @media(max-width: 1200px) {
            #cards {
                flex-direction: column; 
                align-items: center;
                gap: 4rem;
                padding: 2rem;
            }
            .card .card-image { width: 350px; }
        }

        @media(max-width: 600px) {
            #cards { gap: 2rem; padding: 1rem; }
            .card { width: 80%; }
            .card .card-image { width: 100%; }
        }
